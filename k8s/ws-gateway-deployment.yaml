apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-gateway
  namespace: ticket-system
  labels:
    app: ws-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ws-gateway
  template:
    metadata:
      labels:
        app: ws-gateway
    spec:
      containers:
        - name: ws-gateway
          image: ticket-system/ws-gateway:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: ticket-system-config
            - secretRef:
                name: ticket-system-secret
          env:
            - name: APP_PORT
              value: "8081"
            - name: OTEL_SERVICE_NAME
              value: "ws-gateway"
            - name: WS_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
