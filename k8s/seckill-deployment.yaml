apiVersion: apps/v1
kind: Deployment
metadata:
  name: seckill
  namespace: ticket-system
  labels:
    app: seckill
spec:
  replicas: 3
  selector:
    matchLabels:
      app: seckill
  template:
    metadata:
      labels:
        app: seckill
    spec:
      containers:
        - name: seckill
          image: ticket-system/seckill:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: ticket-system-config
            - secretRef:
                name: ticket-system-secret
          env:
            - name: APP_PORT
              value: "8080"
            - name: OTEL_SERVICE_NAME
              value: "seckill"
            - name: WS_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "2000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: seckill-hpa
  namespace: ticket-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: seckill
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
