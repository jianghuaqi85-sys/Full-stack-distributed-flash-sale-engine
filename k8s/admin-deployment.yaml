apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: ticket-system
  labels:
    app: admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      containers:
        - name: admin
          image: ticket-system/admin:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: ticket-system-config
            - secretRef:
                name: ticket-system-secret
          env:
            - name: APP_PORT
              value: "8080"
            - name: OTEL_SERVICE_NAME
              value: "admin"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
